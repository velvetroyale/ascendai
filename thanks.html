<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You | AscendAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:
radial-gradient(circle at top, rgba(123,97,255,.18), transparent 40%),
linear-gradient(135deg,#0b0b0b,#131326);
color:#ffffff;
text-align:center;
line-height:1.6;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
max-width:800px;
width:100%;
}

.logo{
width:160px;
margin-bottom:25px;
filter:drop-shadow(0 0 30px rgba(123,97,255,.35));
}

h1{
color:#7B61FF;
font-size:48px;
margin-bottom:15px;
font-weight:800;
}

p{
font-size:18px;
color:#cfcfcf;
margin-bottom:15px;
}

.card{
padding:40px;
background:#151515;
border:1px solid rgba(123,97,255,.25);
border-radius:18px;
box-shadow:
0 0 40px rgba(123,97,255,.12),
0 0 80px rgba(123,97,255,.05);
}

.highlight{
color:#7B61FF;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:20px;
padding:16px 28px;
background:#7B61FF;
color:#fff;
text-decoration:none;
font-weight:bold;
border-radius:14px;
transition:.25s ease;
box-shadow:0 10px 30px rgba(123,97,255,.35);
}

.btn:hover{
transform:translateY(-2px);
}

.micro{
font-size:13px;
opacity:.6;
margin-top:18px;
}

@media(max-width:768px){

h1{
font-size:36px;
}

p{
font-size:16px;
}

.card{
padding:30px 20px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="ascend.png" class="logo">

<div class="card">

<h1>⚡ You're In</h1>

<p>
Your <span class="highlight">AscendAI Toolkit request</span> has been received.
</p>

<p>
Check your email for access instructions and your AI resources.
</p>

<a href="https://instagram.com/ascendai" class="btn">
Continue Exploring AI →
</a>

<p class="micro">
Beginner friendly • Instant access • Future-ready
</p>

</div>

</div>

</body>
</html>
